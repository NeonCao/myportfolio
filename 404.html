<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function (location) {
        const segmentsToKeep = 1;
        const basePath = location.pathname
          .split('/')
          .slice(0, 1 + segmentsToKeep)
          .join('/');
        const routePath = location.pathname
          .slice(1)
          .split('/')
          .slice(segmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~');
        const query = location.search ? `&${location.search.slice(1).replace(/&/g, '~and~')}` : '';

        location.replace(
          `${location.protocol}//${location.hostname}${location.port ? `:${location.port}` : ''}${basePath}/?/${routePath}${query}${location.hash}`
        );
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
