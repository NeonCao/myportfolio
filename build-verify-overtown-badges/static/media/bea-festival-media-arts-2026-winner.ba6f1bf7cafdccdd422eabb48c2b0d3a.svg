  <text class="white winner" x="450" y="145" text-anchor="middle">WINNER</text>
  <text class="white bea" x="510" y="250" text-anchor="middle">BEA</text>
  <text class="white festival" x="470" y="360" text-anchor="middle" transform="rotate(-6 470 360)">FESTIVAL OF</text>
  <text class="white media" x="472" y="470" text-anchor="middle" transform="rotate(-6 472 470)">MEDIA ARTS</text>
  <text class="white year" x="450" y="650" text-anchor="middle">2026</text>
