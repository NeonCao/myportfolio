<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">BEA Festival of Media Arts 2026 Winner badge</title>
  <desc id="desc">A laurel badge for Winner, BEA Festival of Media Arts 2026.</desc>
  <defs>
    <style>
      .white { fill: #f5f5f5; }
      .winner {
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        font-size: 92px;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .bea {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 56px;
        font-weight: 700;
      }
      .festival {
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        font-size: 82px;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .media {
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        font-size: 84px;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .year {
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        font-size: 106px;
        font-weight: 700;
        letter-spacing: 3px;
      }
    </style>
    <g id="leaf">
      <ellipse class="white" cx="0" cy="0" rx="18" ry="46" transform="rotate(-28)" />
    </g>
  </defs>

  <g transform="translate(220 700)">
    <use href="#leaf" transform="rotate(-72) translate(0 -220)" />
    <use href="#leaf" transform="rotate(-60) translate(0 -220)" />
    <use href="#leaf" transform="rotate(-48) translate(0 -220)" />
    <use href="#leaf" transform="rotate(-36) translate(0 -220)" />
    <use href="#leaf" transform="rotate(-24) translate(0 -220)" />
    <use href="#leaf" transform="rotate(-12) translate(0 -220)" />
    <use href="#leaf" transform="rotate(0) translate(0 -220)" />
    <use href="#leaf" transform="rotate(12) translate(0 -220)" />
    <use href="#leaf" transform="rotate(24) translate(0 -220)" />
    <use href="#leaf" transform="rotate(36) translate(0 -220)" />
    <use href="#leaf" transform="rotate(48) translate(0 -220)" />
    <use href="#leaf" transform="rotate(60) translate(0 -220)" />
    <use href="#leaf" transform="rotate(72) translate(0 -220)" />
    <path class="white" d="M54 120 C112 70 148 38 198 0" fill="none" stroke="#f5f5f5" stroke-width="10" stroke-linecap="round" />
  </g>

  <g transform="translate(680 700) scale(-1 1)">
    <use href="#leaf" transform="rotate(-72) translate(0 -220)" />
    <use href="#leaf" transform="rotate(-60) translate(0 -220)" />
    <use href="#leaf" transform="rotate(-48) translate(0 -220)" />
    <use href="#leaf" transform="rotate(-36) translate(0 -220)" />
    <use href="#leaf" transform="rotate(-24) translate(0 -220)" />
    <use href="#leaf" transform="rotate(-12) translate(0 -220)" />
    <use href="#leaf" transform="rotate(0) translate(0 -220)" />
    <use href="#leaf" transform="rotate(12) translate(0 -220)" />
    <use href="#leaf" transform="rotate(24) translate(0 -220)" />
    <use href="#leaf" transform="rotate(36) translate(0 -220)" />
    <use href="#leaf" transform="rotate(48) translate(0 -220)" />
    <use href="#leaf" transform="rotate(60) translate(0 -220)" />
    <use href="#leaf" transform="rotate(72) translate(0 -220)" />
    <path class="white" d="M54 120 C112 70 148 38 198 0" fill="none" stroke="#f5f5f5" stroke-width="10" stroke-linecap="round" />
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M227 410 A105 105 0 1 1 410 333" stroke="#19c7d8" stroke-width="5" />
    <path d="M233 400 A97 97 0 1 1 401 329" stroke="#f7d64b" stroke-width="5" />
    <path d="M240 390 A89 89 0 1 1 393 325" stroke="#f8688c" stroke-width="5" />
    <path d="M247 382 A82 82 0 1 1 386 321" stroke="#8fe36c" stroke-width="5" />
