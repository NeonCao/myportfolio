<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-labelledby="title desc">
  <title id="title">The Polys Immersive Awards 2025 Nominee badge</title>
  <desc id="desc">A laurel badge for The Polys Immersive Awards 2025 Nominee, Education Experience of the Year, Saying Their Names.</desc>
  <defs>
